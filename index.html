<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="灵境AI">
  <meta name="theme-color" content="#f5f5f7">
  <title>DeepSeek AI · 灵境</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
    input, textarea { -webkit-user-select:text; user-select:text; }
    html, body { width:100%; height:100%; overflow:hidden; position:fixed; top:0; left:0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      display: flex; align-items: center; justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .app-container {
      width:100%; max-width:430px; height:100%; max-height:100vh;
      background:#fff; display:flex; flex-direction:column; overflow:hidden; position:relative;
    }
    .status-bar-spacer { height:env(safe-area-inset-top,0px); min-height:0; background:#fff; flex-shrink:0; }
    .chat-area {
      flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
      padding:16px 16px 8px; display:flex; flex-direction:column; gap:14px;
      background:#fafafa; overscroll-behavior:contain;
    }
    .message { display:flex; flex-direction:column; max-width:85%; animation:fadeInUp 0.3s ease-out; }
    .message.user { align-self:flex-end; align-items:flex-end; }
    .message.assistant { align-self:flex-start; align-items:flex-start; }
    .bubble {
      padding:12px 16px; border-radius:20px; font-size:16px; line-height:1.5;
      word-break:break-word; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.04);
    }
    .user .bubble { background:#007aff; color:#fff; border-bottom-right-radius:4px; }
    .assistant .bubble { background:#fff; border:1px solid #e9e9ed; border-bottom-left-radius:4px; color:#1c1c1e; }
    .sender-name { font-size:12px; font-weight:600; color:#8e8e93; margin-bottom:4px; padding:0 8px; }

    .input-container {
      padding:10px 12px; padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));
      background:#fff; border-top:0.5px solid #e0e0e0;
      display:flex; align-items:center; gap:8px; flex-shrink:0;
    }
    .input-container input {
      flex:1; border:1px solid #e5e5ea; border-radius:22px; padding:12px 18px;
      font-size:16px; background:#f9f9f9; outline:none; -webkit-appearance:none;
    }
    .input-container input:focus { border-color:#007aff; background:#fff; }
    .send-btn {
      background:#007aff; border:none; color:#fff; min-width:44px; width:44px; height:44px;
      border-radius:50%; font-size:18px; display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0;
    }
    .send-btn:active { background:#0051d5; transform:scale(0.94); }

    .menu-trigger {
      background:#fff; padding:6px 20px;
      padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
      display:flex; justify-content:center; flex-shrink:0;
    }
    .menu-button {
      background:#f2f2f7; border:none; padding:10px 24px; border-radius:24px;
      font-weight:600; font-size:15px; color:#007aff; display:flex; align-items:center; gap:6px;
      cursor:pointer; min-height:44px;
    }
    .menu-button:active { background:#e0e0e5; transform:scale(0.97); }

    /* Action Sheet */
    .action-sheet-overlay {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.35); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      display:flex; align-items:flex-end; justify-content:center;
      z-index:1000; visibility:hidden; opacity:0; transition:0.3s;
      padding-bottom:env(safe-area-inset-bottom);
    }
    .action-sheet-overlay.active { visibility:visible; opacity:1; }
    .action-sheet {
      background:#f9f9fb; width:100%; max-width:430px;
      border-radius:14px 14px 0 0; padding:8px;
      padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));
      transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
    }
    .active .action-sheet { transform:translateY(0); }
    .sheet-option {
      background:#fff; padding:14px 20px; border-radius:12px; margin-bottom:8px;
      font-size:17px; text-align:center; color:#007aff; font-weight:500;
      cursor:pointer; min-height:50px; display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .sheet-option:active { background:#e8e8ed; }
    .cancel-option { font-weight:600; color:#1c1c1e; margin-top:4px; }

    /* 全屏面板通用 */
    .full-panel {
      position:absolute; top:0; left:0; width:100%; height:100%;
      z-index:20; background:#fff; overflow:hidden;
      transform:translateX(100%); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
      display:flex; flex-direction:column;
    }
    .full-panel.open { transform:translateX(0); }
    .panel-header {
      padding:12px 20px; padding-top:calc(12px + env(safe-area-inset-top,0px));
      font-weight:700; font-size:18px; display:flex; justify-content:space-between;
      align-items:center; border-bottom:0.5px solid #e0e0e0; background:#fff; z-index:2; flex-shrink:0;
    }
    .panel-close { font-size:22px; cursor:pointer; color:#007aff; padding:8px; min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; }
    .panel-iframe { flex:1; border:none; width:100%; }

    /* 密钥弹窗 */
    .key-overlay {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.5); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center;
      z-index:2000; padding:20px;
    }
    .key-dialog {
      background:#fff; border-radius:20px; padding:24px 20px;
      width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.2);
    }
    .key-dialog h3 { font-size:20px; margin-bottom:8px; text-align:center; }
    .key-dialog p { font-size:13px; color:#8e8e93; text-align:center; margin-bottom:16px; line-height:1.5; }
    .key-dialog input {
      width:100%; border:1px solid #dcdce0; border-radius:14px; padding:14px;
      font-size:15px; background:#f9f9f9; font-family:monospace; -webkit-appearance:none;
      margin-bottom:12px;
    }
    .key-dialog input:focus { border-color:#007aff; outline:none; }
    .key-dialog .key-btns { display:flex; gap:10px; }
    .key-dialog button {
      flex:1; border:none; border-radius:14px; padding:14px; font-size:16px; font-weight:600; cursor:pointer;
    }
    .key-save-btn { background:#007aff; color:#fff; }
    .key-save-btn:active { background:#0051d5; }
    .key-skip-btn { background:#f2f2f7; color:#8e8e93; }
    .key-skip-btn:active { background:#e0e0e5; }
    .key-status { text-align:center; font-size:12px; margin-top:8px; min-height:18px; }

    @keyframes fadeInUp {
      from { opacity:0; transform:translateY(10px); }
      to { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <div class="status-bar-spacer"></div>
  <div class="chat-area" id="chatArea">
    <div class="message assistant">
      <span class="sender-name">灵境AI</span>
      <div class="bubble">👋 欢迎使用灵境AI！请先设置API密钥。</div>
    </div>
  </div>

  <div class="input-container">
    <input type="text" id="userInput" placeholder="输入消息..." autocomplete="off" autocorrect="off" autocapitalize="none" />
    <button class="send-btn" id="sendBtn">↑</button>
  </div>

  <div class="menu-trigger">
    <button class="menu-button" id="menuButton">📋 菜单</button>
  </div>

  <!-- 论坛 -->
  <div class="full-panel" id="forumWrapper">
    <div class="panel-header"><span>🌐 灵境论坛</span><span class="panel-close" id="forumClose">✕</span></div>
    <iframe id="forumIframe" class="panel-iframe" src="forum.html" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
  </div>

  <!-- AI对话设置 -->
  <div class="full-panel" id="settingsWrapper">
    <div class="panel-header"><span>⚙️ AI 对话设置</span><span class="panel-close" id="settingsClose">✕</span></div>
    <iframe id="settingsIframe" class="panel-iframe" src="settings.html" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
  </div>

  <!-- AI参数调节 -->
  <div class="full-panel" id="paramsWrapper">
    <div class="panel-header"><span>🎛️ AI 参数调节</span><span class="panel-close" id="paramsClose">✕</span></div>
    <iframe id="paramsIframe" class="panel-iframe" src="params.html" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
  </div>
</div>

<!-- Action Sheet -->
<div class="action-sheet-overlay" id="actionSheetOverlay">
  <div class="action-sheet">
    <div class="sheet-option" id="menuForum">🗨️ 进入论坛</div>
    <div class="sheet-option" id="menuSettings">⚙️ AI 对话设置</div>
    <div class="sheet-option" id="menuParams">🎛️ AI 参数调节</div>
    <div class="sheet-option cancel-option" id="menuCancel">取消</div>
  </div>
</div>

<!-- API Key 弹窗 -->
<div class="key-overlay" id="keyOverlay">
  <div class="key-dialog">
    <h3>🔑 设置 API 密钥</h3>
    <p>请输入你的 DeepSeek API 密钥<br>密钥仅保存在你的浏览器本地</p>
    <input type="password" id="keyOverlayInput" placeholder="sk-xxxxxxxxxxxxxxxx" autocomplete="off">
    <div class="key-btns">
      <button class="key-skip-btn" id="keySkipBtn">稍后设置</button>
      <button class="key-save-btn" id="keySaveBtn">保存</button>
    </div>
    <div class="key-status" id="keyStatus"></div>
  </div>
</div>

<script>
  (function() {
    const API_URL = 'https://api.deepseek.com/chat/completions';

    // ========== 持久化状态 ==========
    let aiSettings = {
      name: '灵境AI',
      background: '',
      personality: '',
      opening: '',
      tone: '幽默风趣'
    };
    let aiParams = { temperature: 1.0, topP: 0.9, maxTokens: null, useCustom: false };
    let conversationHistory = [];
    let currentUserName = '探索者';
    let isGenerating = false;

    function getApiKey() { return localStorage.getItem('deepseek_api_key') || ''; }
    function setApiKey(key) { localStorage.setItem('deepseek_api_key', key); }

    // ========== DOM ==========
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const actionSheetOverlay = document.getElementById('actionSheetOverlay');
    const forumWrapper = document.getElementById('forumWrapper');
    const settingsWrapper = document.getElementById('settingsWrapper');
    const paramsWrapper = document.getElementById('paramsWrapper');
    const forumIframe = document.getElementById('forumIframe');
    const settingsIframe = document.getElementById('settingsIframe');
    const paramsIframe = document.getElementById('paramsIframe');
    const keyOverlay = document.getElementById('keyOverlay');
    const keyOverlayInput = document.getElementById('keyOverlayInput');
    const keyStatus = document.getElementById('keyStatus');

    // ========== 密钥弹窗 ==========
    (function() {
      const savedKey = getApiKey();
      if (!savedKey) { keyOverlay.style.display = 'flex'; }
      else { keyOverlay.style.display = 'none'; }

      document.getElementById('keySaveBtn').onclick = function() {
        const key = keyOverlayInput.value.trim();
        if (!key) { keyStatus.textContent = '⚠️ 请输入密钥'; keyStatus.style.color = '#ff3b30'; return; }
        if (!key.startsWith('sk-')) { keyStatus.textContent = '⚠️ 密钥格式不正确'; keyStatus.style.color = '#ff3b30'; return; }
        setApiKey(key);
        keyStatus.textContent = '✅ 密钥已保存！'; keyStatus.style.color = '#34c759';
        setTimeout(() => { keyOverlay.style.display = 'none'; }, 800);
      };
      document.getElementById('keySkipBtn').onclick = function() {
        keyOverlay.style.display = 'none';
        addMessage('assistant', '💡 你可以在菜单 → AI对话设置中随时设置API密钥');
      };
    })();

    // ========== 加载/保存设置 ==========
    function loadSettings() {
      try {
        const s = JSON.parse(localStorage.getItem('ai_settings_v2'));
        if (s) aiSettings = s;
        const p = JSON.parse(localStorage.getItem('ai_params_v2'));
        if (p) aiParams = p;
        const n = localStorage.getItem('user_name_v4');
        if (n) currentUserName = n;
      } catch(e) {}
      notifyAllIframes();
    }

    function saveSettings(newSettings) {
      if (newSettings) aiSettings = newSettings;
      localStorage.setItem('ai_settings_v2', JSON.stringify(aiSettings));
      notifyAllIframes();
    }

    function saveParams(newParams) {
      if (newParams) aiParams = newParams;
      localStorage.setItem('ai_params_v2', JSON.stringify(aiParams));
    }

    function notifyAllIframes() {
      const data = {
        type: 'syncFromParent',
        settings: aiSettings,
        params: aiParams,
        userName: currentUserName,
        apiKey: getApiKey(),
        chatHistory: conversationHistory.slice(-10).map(m => ({ role: m.role, content: m.content }))
      };
      [settingsIframe, paramsIframe, forumIframe].forEach(iframe => {
        try { if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage(data, '*'); } catch(e) {}
      });
    }

    // ========== 消息 ==========
    function addMessage(role, content, senderName) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      let name;
      if (role === 'user') {
        name = currentUserName;
      } else {
        name = senderName || aiSettings.name || 'AI';
      }
      div.innerHTML = `<span class="sender-name">${name}</span><div class="bubble">${escapeHtml(content)}</div>`;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      return div;
    }

    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML.replace(/\n/g, '<br>');
    }

    // ========== API调用 ==========
    async function callDeepSeek(userMessage) {
      const apiKey = getApiKey();
      let systemPrompt = '';
      if (aiSettings.background) systemPrompt += `【背景设定】${aiSettings.background}\n`;
      if (aiSettings.personality) systemPrompt += `【性格特点】${aiSettings.personality}\n`;
      systemPrompt += `【说话风格】${aiSettings.tone}\n`;
      if (systemPrompt.trim() === '') systemPrompt = '你是一个友好的助手。';

      const messages = [{ role: "system", content: systemPrompt }];
      let historyToUse;
      if (aiParams.useCustom && aiParams.maxTokens) {
        historyToUse = conversationHistory.slice(-Math.floor(aiParams.maxTokens / 100));
      } else {
        historyToUse = conversationHistory.slice(-8);
      }
      messages.push(...historyToUse);
      messages.push({ role: "user", content: userMessage });

      const requestBody = { model: 'deepseek-chat', messages, max_tokens: 800 };
      if (aiParams.useCustom) {
        requestBody.temperature = aiParams.temperature;
        requestBody.top_p = aiParams.topP;
      }

      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 30000);
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify(requestBody),
          signal: ctrl.signal
        });
        clearTimeout(tid);
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || `错误${res.status}`); }
        const data = await res.json();
        return data.choices[0].message.content;
      } catch(e) { clearTimeout(tid); throw e; }
    }

    // ========== 发送 ==========
    async function handleSend() {
      if (isGenerating) return;
      const text = userInput.value.trim();
      if (!text) return;
      const apiKey = getApiKey();
      if (!apiKey) { addMessage('assistant', '⚠️ 请先设置API密钥'); userInput.value = ''; return; }
      addMessage('user', text);
      userInput.value = '';
      conversationHistory.push({ role: 'user', content: text });
      isGenerating = true; sendBtn.style.opacity = '0.5';
      const loading = addMessage('assistant', '思考中...');
      try {
        const reply = await callDeepSeek(text);
        if (loading.parentNode) loading.remove();
        addMessage('assistant', reply, aiSettings.name);
        conversationHistory.push({ role: 'assistant', content: reply });
        if (conversationHistory.length > 30) conversationHistory = conversationHistory.slice(-30);
      } catch(e) {
        if (loading.parentNode) loading.remove();
        addMessage('assistant', '❌ ' + e.message);
      } finally { isGenerating = false; sendBtn.style.opacity = '1'; }
    }

    // ========== 面板控制 ==========
    function openPanel(wrapper) { wrapper.classList.add('open'); notifyAllIframes(); }
    function closePanel(wrapper) { wrapper.classList.remove('open'); }
    function openActionSheet() { actionSheetOverlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
    function closeActionSheet() { actionSheetOverlay.classList.remove('active'); document.body.style.overflow = ''; }

    // ========== 事件 ==========
    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSend(); });
    document.getElementById('menuButton').addEventListener('click', openActionSheet);
    document.getElementById('menuForum').addEventListener('click', () => { closeActionSheet(); setTimeout(() => openPanel(forumWrapper), 300); });
    document.getElementById('menuSettings').addEventListener('click', () => { closeActionSheet(); setTimeout(() => openPanel(settingsWrapper), 300); });
    document.getElementById('menuParams').addEventListener('click', () => { closeActionSheet(); setTimeout(() => openPanel(paramsWrapper), 300); });
    document.getElementById('menuCancel').addEventListener('click', closeActionSheet);
    actionSheetOverlay.addEventListener('click', e => { if (e.target === actionSheetOverlay) closeActionSheet(); });
    document.getElementById('forumClose').addEventListener('click', () => closePanel(forumWrapper));
    document.getElementById('settingsClose').addEventListener('click', () => closePanel(settingsWrapper));
    document.getElementById('paramsClose').addEventListener('click', () => closePanel(paramsWrapper));

    // ========== 接收子页面消息 ==========
    window.addEventListener('message', (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === 'saveSettings') {
        saveSettings(e.data.settings);
        currentUserName = e.data.userName || currentUserName;
        localStorage.setItem('user_name_v4', currentUserName);
        // 清空对话并开场
        conversationHistory = [];
        chatArea.innerHTML = '';
        if (aiSettings.opening) {
          addMessage('assistant', aiSettings.opening, aiSettings.name);
        } else {
          addMessage('assistant', `你好，我是${aiSettings.name}，有什么可以帮你的？`);
        }
        closePanel(settingsWrapper);
      } else if (e.data.type === 'saveParams') {
        saveParams(e.data.params);
        closePanel(paramsWrapper);
      } else if (e.data.type === 'requestSync') {
        notifyAllIframes();
      }
    });

    // ========== 初始化 ==========
    loadSettings();
    if (aiSettings.opening) {
      chatArea.innerHTML = '';
      addMessage('assistant', aiSettings.opening, aiSettings.name);
    }
  })();
</script>
</body>
</html>
